name: CI

on:
  push:
    branches: ["main", "claude/psychologist-saas-mvp-kdSWt"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Prisma lazy proxy: não precisa de DATABASE_URL em build time
          SKIP_ENV_VALIDATION: "1"
